<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stage">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="menu" class="menu">
      <div class="menu-card">
        <div class="logo">☠️</div>
        <h1 class="title">Angry Bucs</h1>
        <p class="subtitle">Hoist the sails, load yer bombs, and sink the porky fleet!</p>
        <div class="asset-row bucs">
          <img src="../Assets/Buc/standardBuc.png" alt="Standard Buc" />
          <img src="../Assets/Buc/fastBuc.png" alt="Fast Buc" />
          <img src="../Assets/Buc/bombBuc.png" alt="Bomb Buc" />
        </div>
        <div class="asset-row pigs">
          <img src="../Assets/Pigs/pig1.png" alt="Pig 1" />
          <img src="../Assets/Pigs/pig2.png" alt="Pig 2" />
        </div>
        <div class="buttons">
          <button id="startBtn">Start Voyage</button>
          <button id="instructionsBtn">Instructions</button>
        </div>

        <div class="callout">
          <span class="anchor">⚓</span>
          Press Enter or tap the deck to begin
        </div>
      </div>
    </div>

    <div id="instructions" class="modal hidden">
      <div class="modal-content">
        <h2>Instructions</h2>
        <p>Use the arrow keys to steer the ship. Press Enter to launch your cannonballs at the greedy pigs.</p>
        <button id="closeInstructions">Back to Deck</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
